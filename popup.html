<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 180px; padding: 10px; font-family: sans-serif; }
    .toggle-container { display: flex; align-items: center; gap: 8px; }
    input[type="checkbox"] { cursor: pointer; }
  </style>
</head>
<body>
  <div class="toggle-container">
    <input type="checkbox" id="toastToggle" checked>
    <label for="toastToggle" style="cursor: pointer;">알림 메시지 켜기</label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
